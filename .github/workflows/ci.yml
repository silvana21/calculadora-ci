name: Calculadora
on:
    push:
jobs:
    testes:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Configurar o Java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '21'
            - name: Executar os testes
              run: ./mvnw test